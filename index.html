<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>powerlift.ing</title>
    <meta name="description" content="Shareable powerlifting program builder. State lives in the URL." />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <a class="brand" id="homeLink" href="/" aria-label="powerlift.ing home">
          <div class="brand__title">powerlift.ing</div>
          <div class="brand__subtitle">Program state lives in your link</div>
        </a>
      </div>
      <div class="topbar__right">
        <button id="themeBtn" class="btn btn--ghost" type="button">Theme</button>
        <button id="copyLinkBtn" class="btn btn--primary" type="button">Copy link</button>
      </div>
    </header>

    <main class="app" id="app">
      <section class="weekbar" aria-label="Week navigation">
        <div class="weekbar__nav">
          <div class="weekTabsWrap">
            <div id="cycleTabs" class="cycleTabs" role="tablist" aria-label="Mesocycles"></div>
            <div id="weekTabs" class="weekTabs" role="tablist" aria-label="Weeks"></div>
            <div class="weekbar__hint" id="weekHint"></div>
          </div>
        </div>

        <div class="weekbar__actions">
          <div class="weekbar__settings" aria-label="Week settings">
            <label class="control">
              <span class="control__label">Meso</span>
              <input id="cycleNameInput" class="input input--compact" type="text" placeholder="e.g. Hypertrophy" />
            </label>
            <label class="control control--checkbox">
              <input id="standardWeekChk" type="checkbox" />
              <span>Standard week</span>
            </label>
            <label class="control">
              <span class="control__label">Days</span>
              <select id="dayCountSelect" class="select select--compact" aria-label="Days per week">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
              </select>
            </label>
          </div>
        </div>
      </section>

      <div class="container">
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="weekMount"></div>
      </div>
    </main>

    <script src="./vendor/lz-string.min.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
