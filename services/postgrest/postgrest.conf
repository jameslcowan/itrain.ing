# PostgREST — REST API over PostgreSQL (no ORM)
# Install: infra/server/install-postgrest.sh
# Secrets: /etc/panax/postgrest.env (not in git)

db-uri = "postgres://authenticator:@127.0.0.1:5432/panax"
db-schemas = "public"
db-anon-role = "web_anon"
server-host = "127.0.0.1"
server-port = 3000

openapi-mode = "ignore-transaction"
