[build]
  publish = "."

[[headers]]
  for = "/p/*"
  [headers.values]
    # Shared-program pages are effectively infinite/user-generated and should not be indexed.
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[redirects]]
  from = "/p/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


