name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
    paths:
      - "sites/**"
      - ".github/workflows/deploy.yml"
      - "infra/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: powerlifting
            domain: powerlift.ing
          - site: powerbuilding
            domain: powerbuild.ing
          - site: olympiclifting
            domain: olympiclift.ing
          - site: bootybuilding
            domain: bootybuild.ing
          - site: itraining
            domain: itrain.ing
    defaults:
      run:
        working-directory: sites/${{ matrix.site }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json

      - run: npm ci && npm run build

      - name: Rsync to droplet
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --delete-excluded --exclude-from=../../infra/deploy/rsync-excludes.txt
          path: ./
          remote_path: /var/www/${{ matrix.domain }}/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
