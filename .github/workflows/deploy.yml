# Deploy to DigitalOcean — does NOT run on every push (avoids red X when secrets missing).
#
# Manual: Actions → Deploy to DigitalOcean → Run workflow
# Auto after green CI: set repo variable AUTO_DEPLOY=true + deploy secrets
name: Deploy to DigitalOcean

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && vars.AUTO_DEPLOY == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: powerlifting
            domain: powerlift.ing
          - site: powerbuilding
            domain: powerbuild.ing
          - site: olympiclifting
            domain: olympiclift.ing
          - site: bootybuilding
            domain: bootybuild.ing
          - site: itraining
            domain: itrain.ing
    defaults:
      run:
        working-directory: sites/${{ matrix.site }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json

      - run: npm ci && npm run build

      - name: Rsync to droplet
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --delete-excluded --exclude-from=../../infra/deploy/rsync-excludes.txt
          path: ./
          remote_path: /var/www/${{ matrix.domain }}/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
